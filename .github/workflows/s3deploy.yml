name: Deploy to S3 buckets for assignments

on:
  push:
    branches:
      - main

# 1. ADD THIS PERMISSIONS BLOCK
permissions:
  id-token: write   # Required to request the JWT from GitHub
  contents: read    # Required for actions/checkout

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6 # Note: v4 is the current stable version

      # 2. UPDATE THIS STEP TO USE THE ROLE ARN INSTEAD OF ACCESS KEYS
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }} # Make sure this secret exists in GitHub
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync files to S3
        run: |
          aws s3 sync . s3://${{ secrets.S3_BUCKET_NAME }} --delete --exclude ".*" --exclude "dockerfile" --exclude "*.txt"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"